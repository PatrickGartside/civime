# CiviMe Local Development — see docs/infrastructure/INFRASTRUCTURE.md for full setup guide
services:
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"  # Production uses Nginx Proxy Manager; contributors access via localhost:8080
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DB_NAME: wordpress
      PHP_MEMORY_LIMIT: 512M
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_MEMORY_LIMIT', '512M');
        define('WP_DEBUG', true);  # Enabled for local development; set to false in production
    volumes:
      - wp_data:/var/www/html
      # Config files
      - ./.htaccess:/var/www/html/.htaccess
      - ./apache-wordpress.conf:/etc/apache2/conf-enabled/wordpress.conf
      # Theme and plugins — bind-mounted from repo so edits reflect instantly
      - ./wp-content/themes/civime:/var/www/html/wp-content/themes/civime
      - ./wp-content/plugins/civime-core:/var/www/html/wp-content/plugins/civime-core
      - ./wp-content/plugins/civime-meetings:/var/www/html/wp-content/plugins/civime-meetings
      - ./wp-content/plugins/civime-notifications:/var/www/html/wp-content/plugins/civime-notifications
      - ./wp-content/plugins/civime-guides:/var/www/html/wp-content/plugins/civime-guides
      - ./wp-content/plugins/civime-events:/var/www/html/wp-content/plugins/civime-events
      - ./wp-content/plugins/civime-topics:/var/www/html/wp-content/plugins/civime-topics
      - ./wp-content/plugins/civime-i18n:/var/www/html/wp-content/plugins/civime-i18n
      - ./wp-content/page-content:/var/www/html/wp-content/page-content
    # No external network needed — contributors access via localhost:8080

volumes:
  db_data:
  wp_data:
